<!DOCTYPE html>
<html lang="en" class="landing-html">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Inspection Assistant - SiteSureLabs</title>
  <meta name="description" content="Inspection Assistant — upload a site photo and ask follow-up questions about defects, safety, and remediation.">
  <link rel="icon" type="image/png" href="/MyHomeLogo/MyHomeLogo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../../insp-clean-chat.css">
</head>
<body class="landing-page dashboard-page page--ai-chat">
  <!-- nav injected by shared/components/dashboard-nav.js -->

  <main class="landing-main dashboard-main dashboard-main--cht">
    <p class="cht-alert analysis-error-banner analysis-error-banner--workspace hidden" id="workspace-error" hidden role="alert"></p>

    <div class="cht-layout">
      <aside class="cht-sidebar" id="cht-sidebar" aria-label="Chat history">
        <div class="cht-sidebar__header">
          <button type="button" class="cht-sidebar__new-btn" id="sidebar-new-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span>New chat</span>
          </button>
        </div>
        <nav class="cht-sidebar__nav" id="cht-sidebar-sessions" aria-label="Previous chats"></nav>
      </aside>

      <div class="cht-sidebar-backdrop hidden" id="cht-sidebar-backdrop" aria-hidden="true"></div>

      <section class="cht" id="gem-chat" aria-labelledby="cht-title">
        <div class="cht-shell cht-shell--awaiting-upload" id="cht-shell">
          <header class="cht-topbar">
            <div class="cht-topbar__inner">
              <div class="cht-topbar__left">
                <button type="button" class="cht-topbar__sidebar-toggle" id="sidebar-toggle-btn" aria-label="Toggle chat history" aria-expanded="false">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 id="cht-title" class="cht-topbar__title">Inspection Assistant</h1>
              </div>
              <div class="cht-topbar__actions">
                <a href="/" class="cht-btn cht-btn--back-home" id="cht-back-home-btn" aria-label="Back to home">← Back to home</a>
              </div>
            </div>
          </header>

          <div class="cht-stream" id="gem-messages-wrap">
            <div class="cht-stream-inner">
              <div class="cht-stream-inner__frost" aria-hidden="true"></div>

              <div class="cht-empty" id="gem-empty-state">
                <input type="file" id="gem-file-input" accept="image/*,image/heic,image/heif,.heic,.heif" hidden>
                <button type="button" class="cht-upload-card" id="gem-upload-card">
                  <span class="cht-upload-card__inner">
                    <span class="cht-upload-card__icon" aria-hidden="true">
                      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                        <rect x="8" y="14" width="48" height="36" rx="6" fill="url(#uc-bg)"/>
                        <rect x="8" y="14" width="48" height="36" rx="6" stroke="url(#uc-stroke)" stroke-width="1.5"/>
                        <circle cx="22" cy="26" r="4.5" fill="#93c5fd"/>
                        <path d="M8 40l12-10a3 3 0 0 1 3.8 0l8.2 7 5.6-4.2a3 3 0 0 1 3.6 0L56 44" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <path d="M8 42a6 6 0 0 0 6 8h36a6 6 0 0 0 6-5.5" fill="url(#uc-hill)" opacity="0.35"/>
                        <g class="cht-upload-card__sparkle">
                          <path d="M50 8l1.8 4.2L56 14l-4.2 1.8L50 20l-1.8-4.2L44 14l4.2-1.8Z" fill="url(#uc-spark)"/>
                        </g>
                        <g class="cht-upload-card__sparkle cht-upload-card__sparkle--sm">
                          <path d="M42 4l1 2.2L45.2 7.4l-2.2 1L42 10.6l-1-2.2L38.8 7.4l2.2-1Z" fill="#a78bfa"/>
                        </g>
                        <defs>
                          <linearGradient id="uc-bg" x1="8" y1="14" x2="56" y2="50"><stop stop-color="#eff6ff"/><stop offset="1" stop-color="#f0f0ff"/></linearGradient>
                          <linearGradient id="uc-stroke" x1="8" y1="14" x2="56" y2="50"><stop stop-color="#bfdbfe"/><stop offset="1" stop-color="#c7d2fe"/></linearGradient>
                          <linearGradient id="uc-hill" x1="8" y1="38" x2="56" y2="50"><stop stop-color="#93c5fd"/><stop offset="1" stop-color="#a5b4fc"/></linearGradient>
                          <linearGradient id="uc-spark" x1="44" y1="8" x2="56" y2="20"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#6366f1"/></linearGradient>
                        </defs>
                      </svg>
                    </span>
                    <span class="cht-upload-card__text">Upload a photo to start</span>
                    <span class="cht-upload-card__sub">Drop an image here or click to browse</span>
                  </span>
                </button>
              </div>

              <section class="cht-stage hidden" id="cht-stage" hidden aria-live="polite" aria-label="Inspection preview">
                <div class="cht-stage__inner">
                  <p class="cht-stage__eyebrow">
                    <span class="cht-stage__check" aria-hidden="true">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
                    </span>
                    Image attached
                  </p>
                  <h2 class="cht-stage__title">Start your inspection</h2>
                  <p class="cht-stage__sub">We'll analyze this photo for defects, safety concerns, and severity. Ask follow-up questions after the report is ready.</p>

                  <figure class="cht-stage__preview" id="cht-stage-preview">
                    <img id="cht-stage-img" alt="Uploaded site photo preview" decoding="async">
                  </figure>

                  <div class="cht-stage__actions" id="cht-stage-actions">
                    <button type="button" class="cht-stage__cta" id="cht-stage-start">
                      <span class="cht-stage__cta-label">Start Analysis</span>
                      <svg class="cht-stage__cta-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
                    </button>
                    <button type="button" class="cht-stage__secondary" id="cht-stage-replace">Choose another image</button>
                  </div>

                  <div class="cht-stage__loading hidden" id="cht-stage-loading" hidden role="status">
                    <span class="cht-stage__spinner" aria-hidden="true"></span>
                    <span class="cht-stage__loading-text">Analyzing image<span class="cht-stage__dots" aria-hidden="true"><span>.</span><span>.</span><span>.</span></span></span>
                  </div>
                </div>
              </section>

              <div class="cht-messages" id="gem-messages" role="log" aria-live="polite" aria-relevant="additions"></div>
            </div>
          </div>

          <div class="cht-dock">
            <div class="cht-dock-inner">
              <div class="cht-composer__pending hidden" id="gem-pending" hidden>
                <div class="cht-composer__pending-chip">
                  <img id="gem-pending-img" alt="Attached photo" width="48" height="48">
                  <button type="button" class="cht-composer__pending-x" id="gem-pending-remove" aria-label="Remove photo">&times;</button>
                </div>
              </div>
              <div class="cht-composer-row">
                <div class="cht-composer" id="gem-composer-pill" role="group" aria-label="Message">
                  <button type="button" class="cht-composer__attach" id="gem-attach-btn" aria-label="Attach site photo" title="Attach photo">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                  </button>
                  <div class="cht-composer__main">
                    <textarea id="gem-input" class="cht-composer__input" rows="1" placeholder="Ask about defects, safety, or next steps…"></textarea>
                  </div>
                  <button type="button" class="cht-composer__mic" id="gem-mic-btn" aria-label="Voice input">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                      <line x1="12" y1="19" x2="12" y2="23"/>
                      <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                  </button>
                  <button type="button" class="cht-composer__send" id="gem-send-btn" aria-label="Send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M12 19V5M5 12l7-7 7 7"/>
                    </svg>
                  </button>
                </div>
                <button type="button" class="cht-composer__pdf cht-composer__pdf--outside" id="gem-download-btn" disabled aria-label="Save PDF">Save PDF</button>
              </div>
              <p class="cht-dock__disclaimer">AI may display inaccurate info. Verify important information.</p>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- footer injected by shared/components/dashboard-footer.js -->

  <div class="cht-lightbox hidden" id="cht-lightbox" hidden role="dialog" aria-modal="true" aria-label="Image preview">
    <button type="button" class="cht-lightbox__close" id="cht-lightbox-close" aria-label="Close preview">&times;</button>
    <img class="cht-lightbox__img" id="cht-lightbox-img" alt="Uploaded site photo preview">
  </div>

  <script type="module">
    import { mountDashboardNav } from "/shared/components/dashboard-nav.js";
    import { mountDashboardFooter } from "/shared/components/dashboard-footer.js";
    document.addEventListener("DOMContentLoaded", () => {
      mountDashboardNav("ai-analysis");
      mountDashboardFooter();
    });
  </script>
  <script type="module" src="/ai-analysis.js"></script>
</body>
</html>
