<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Inspection - Defectra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <nav class="glass-nav">
    <div class="nav-container">
      <div class="logo-container">
        <img src="../../MyHomeLogo/MyHomeLogo.png" alt="MyHomeLogo" class="logo-img">
        <span class="logo-text">Defectra</span>
      </div>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/dashboard/image-analysis/">Image Analysis</a></li>
        <li><a href="/dashboard/live/">Live Inspection</a></li>
      </ul>
    </div>
  </nav>

  <section class="feature-section">
    <div class="container">
      <div class="section-header">
        <h2>Live Site Inspection</h2>
        <p>Connect your mobile camera for real-time site monitoring.</p>
      </div>

      <div class="live-stream-container glass-panel">
        <div class="stream-toolbar">
          <div class="status-indicator">
            <span class="dot" id="stream-status-dot"></span>
            <span id="stream-status-text">Not Connected</span>
          </div>
          <div class="stream-actions">
            <button class="primary-btn" id="start-stream-btn">
              <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <rect x="2" y="5" width="14" height="12" rx="1.5" stroke-width="1.8"/>
                <path d="M16 9l5-2.5v11L16 15" stroke-width="1.8" stroke-linejoin="round"/>
                <!-- Scanning crosshair -->
                <circle cx="9" cy="11" r="3" stroke-width="1.2" stroke-dasharray="2 1.5" class="detect-ring" style="animation-duration:4s"/>
                <circle cx="9" cy="11" r="1" fill="currentColor" opacity="0.4" class="ai-core-pulse"/>
              </svg>
              Start Live Inspection
            </button>
            <button class="danger-btn hidden" id="stop-stream-btn">Stop Inspection</button>
          </div>
        </div>

        <div class="video-wrapper">
          <div class="placeholder-view" id="video-placeholder">
            <p>Camera feed not connected.</p>
          </div>
          <video id="live-video" autoplay playsinline muted class="hidden"></video>
        </div>
      </div>
    </div>
  </section>

  <footer class="app-footer">
    <div class="container footer-content">
      <div class="footer-logo">
        <img src="../../MyHomeLogo/MyHomeLogo.png" alt="Logo">
        <span>Defectra</span>
      </div>
      <p class="copyright">&copy; 2026 Defectra Construction Intelligence. All rights reserved.</p>
    </div>
  </footer>

  <script src="../../live.js"></script>
</body>
</html>
